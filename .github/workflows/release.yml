name: Release APK

# Builds the app and refreshes the rolling "latest" pre-release whenever master
# changes, so there is always a fresh, installable APK download link.

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

permissions:
  contents: write   # needed to publish the APK to a Release

concurrency:
  group: release-apk
  cancel-in-progress: true

jobs:
  release:
    name: Build & publish APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install Android SDK components
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools" >/dev/null 2>&1 || true

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Stage APK
        run: |
          mkdir -p artifacts
          cp app/build/outputs/apk/debug/app-debug.apk artifacts/ExpenseTracker-debug.apk

      - name: Publish APK to 'latest' release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true
          gh release create latest artifacts/ExpenseTracker-debug.apk \
            --title "Latest debug build" \
            --notes "Auto-built from ${{ github.sha }}.

          **To install on Android:** download the .apk below, then tap it. If prompted, allow *Install unknown apps* for your browser/Files app. This is a debug build for personal testing." \
            --prerelease \
            --target "${{ github.sha }}"
